<style>
  :root{
    --orange:#F2691E;
    --orange-deep:#D6540E;
    --orange-light:#FFF1E8;
    --black:#161513;
    --charcoal:#211F1C;
    --paper:#FAF9F6;
    --paper-dim:#F1EFE9;
    --line:#E4E0D6;
    --gray:#6B6862;
    --gray-light:#948F86;
    --white:#FFFFFF;
    --radius-badge: 14px;
    --shadow-soft: 0 10px 30px -12px rgba(22,21,19,0.25);
    --shadow-card: 0 2px 0 rgba(22,21,19,0.06), 0 14px 30px -18px rgba(22,21,19,0.35);
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth; scroll-padding-top:96px;}
  body{
    margin:0;
    font-family:'Inter',system-ui,sans-serif;
    color:var(--black);
    background:var(--paper);
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  img{max-width:100%; display:block;}
  a{text-decoration:none; color:inherit;}
  ul{list-style:none; margin:0; padding:0;}
  h1,h2,h3,h4{margin:0; font-family:'Anton',Impact,sans-serif; font-weight:400; letter-spacing:0.01em; text-transform:uppercase;}
  p{margin:0;}
  button{font-family:inherit; cursor:pointer;}
  .wrap{max-width:1180px; margin:0 auto; padding:0 24px;}
  .eyebrow{
    display:inline-flex; align-items:center; gap:8px;
    font-family:'Inter',sans-serif; font-weight:800; font-size:12.5px;
    letter-spacing:0.16em; text-transform:uppercase; color:var(--orange-deep);
  }
  .eyebrow::before{content:""; width:22px; height:2px; background:var(--orange); display:inline-block;}
  .section-head{max-width:640px; margin:0 0 44px;}
  .section-head h2{font-size:clamp(30px,4.4vw,46px); line-height:1.05; margin-top:14px;}
  .section-head p{margin-top:14px; color:var(--gray); font-size:16.5px; line-height:1.6;}
  section{padding:88px 0;}
  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:10px;
    font-weight:800; font-size:14.5px; letter-spacing:0.03em; text-transform:uppercase;
    padding:16px 26px; border-radius:8px; border:2px solid transparent;
    transition:transform .15s ease, box-shadow .15s ease, background .15s ease, color .15s ease, border-color .15s ease;
    white-space:nowrap;
  }
  .btn svg{width:18px; height:18px; flex:none;}
  .btn-primary{background:var(--orange); color:var(--white); box-shadow:var(--shadow-card);}
  .btn-primary:hover{background:var(--orange-deep); transform:translateY(-2px);}
  .btn-dark{background:var(--black); color:var(--white);}
  .btn-dark:hover{background:#000; transform:translateY(-2px);}
  .btn-outline{background:transparent; border-color:currentColor; color:var(--white);}
  .btn-outline:hover{background:rgba(255,255,255,0.12); transform:translateY(-2px);}
  .btn-outline-dark{background:transparent; border-color:var(--black); color:var(--black);}
  .btn-outline-dark:hover{background:var(--black); color:var(--white);}
  .btn:focus-visible{outline:3px solid var(--orange-deep); outline-offset:2px;}
  a:focus-visible, button:focus-visible, input:focus-visible, textarea:focus-visible{outline:3px solid var(--orange-deep); outline-offset:2px;}
  /* ---------- speed lines motif ---------- */
  .speedlines{display:flex; flex-direction:column; gap:6px; width:56px;}
  .speedlines span{display:block; height:5px; background:var(--orange); border-radius:2px;}
  .speedlines span:nth-child(1){width:100%;}
  .speedlines span:nth-child(2){width:68%;}
  .speedlines span:nth-child(3){width:38%;}
  /* ---------- header ---------- */
  header{
    position:sticky; top:0; z-index:60; background:rgba(250,249,246,0.92);
    backdrop-filter:saturate(180%) blur(10px);
    border-bottom:1px solid var(--line);
    transition:box-shadow .2s ease;
  }
  header.scrolled{box-shadow:0 6px 24px -14px rgba(22,21,19,0.35);}
  .nav-row{display:flex; align-items:center; justify-content:space-between; gap:20px; padding:12px 24px; max-width:1180px; margin:0 auto;}
  .brand{display:flex; align-items:center; gap:10px;}
  .brand img{height:46px; width:auto;}
  .nav-links{display:flex; align-items:center; gap:30px; font-weight:700; font-size:14.5px;}
  .nav-links a{position:relative; padding:6px 0; color:var(--black);}
  .nav-links a::after{content:""; position:absolute; left:0; bottom:0; height:2px; width:0; background:var(--orange); transition:width .2s ease;}
  .nav-links a:hover::after{width:100%;}
  .nav-actions{display:flex; align-items:center; gap:12px;}
  .phone-pill{display:flex; align-items:center; gap:8px; font-weight:800; font-size:14.5px;}
  .phone-pill svg{width:18px; height:18px; color:var(--orange-deep);}
  .hamburger{display:none; background:none; border:2px solid var(--black); border-radius:8px; padding:9px; }
  .hamburger svg{width:22px; height:22px;}
  .mobile-nav{display:none; flex-direction:column; gap:2px; background:var(--paper); border-top:1px solid var(--line); padding:8px 24px 18px;}
  .mobile-nav a{padding:12px 4px; font-weight:700; font-size:15.5px; border-bottom:1px solid var(--line);}
  .mobile-nav.open{display:flex;}
  /* ---------- hero ---------- */
  .hero{position:relative; background:var(--black); overflow:hidden; padding:0;}
  .hero-inner{
    position:relative; z-index:2; max-width:1180px; margin:0 auto; padding:84px 24px 92px;
    display:grid; grid-template-columns:1.15fr 0.85fr; gap:50px; align-items:center;
  }
  .hero-bg-lines{position:absolute; inset:0; z-index:0; opacity:0.5; pointer-events:none;}
  .hero-badge-cut{
    position:absolute; right:-140px; top:-140px; width:520px; height:520px; z-index:0;
    background:var(--orange); opacity:0.14; clip-path:polygon(30% 0,100% 0,100% 70%,70% 100%,0 100%,0 30%);
  }
  .hero-eyebrow{color:var(--orange); }
  .hero-eyebrow::before{background:var(--orange);}
  .hero h1{color:var(--white); font-size:clamp(38px,6vw,68px); line-height:0.98; margin-top:18px;}
  .hero h1 span{color:var(--orange);}
  .hero-sub{color:#D8D5CE; font-size:18px; line-height:1.65; margin-top:22px; max-width:520px;}
  .hero-ctas{display:flex; flex-wrap:wrap; gap:14px; margin-top:32px;}
  .hero-trust{display:flex; flex-wrap:wrap; gap:22px; margin-top:40px; padding-top:28px; border-top:1px solid rgba(255,255,255,0.14);}
  .hero-trust-item{display:flex; align-items:center; gap:9px; color:#EDEBE5; font-weight:700; font-size:13.5px; text-transform:uppercase; letter-spacing:0.03em;}
  .hero-trust-item svg{width:19px; height:19px; color:var(--orange); flex:none;}
  .hero-art{position:relative; z-index:2;}
  .hero-art-card{
    background:var(--charcoal); border:1px solid rgba(255,255,255,0.1); border-radius:20px;
    padding:28px; box-shadow:0 30px 60px -20px rgba(0,0,0,0.6);
  }
  .hero-art-card svg{width:100%; height:auto;}
  .hero-badge-tag{
    display:inline-flex; align-items:center; gap:8px; margin-top:18px; background:var(--orange);
    color:var(--white); font-weight:800; font-size:13px; letter-spacing:0.04em; text-transform:uppercase;
    padding:10px 16px; border-radius:8px;
  }
  /* ---------- trust bar ---------- */
  .trustbar{background:var(--white); border-bottom:1px solid var(--line);}
  .trustbar .wrap{
    display:grid; grid-template-columns:repeat(5,1fr); gap:18px; padding:30px 24px;
  }
  .trust-cell{display:flex; flex-direction:column; align-items:center; text-align:center; gap:10px;}
  .trust-cell .icon-badge{width:46px; height:46px; border-radius:50%; background:var(--orange-light); display:flex; align-items:center; justify-content:center;}
  .trust-cell svg{width:22px; height:22px; color:var(--orange-deep);}
  .trust-cell span{font-weight:800; font-size:13px; text-transform:uppercase; letter-spacing:0.02em; color:var(--black);}
  /* ---------- services ---------- */
  .services{background:var(--paper);}
  .service-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:20px;}
  .service-card{
    background:var(--white); border:1px solid var(--line); padding:28px 24px 26px;
    clip-path:polygon(0 0, calc(100% - 20px) 0, 100% 20px, 100% 100%, 0 100%);
    transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;
  }
  .service-card:hover{transform:translateY(-5px); box-shadow:var(--shadow-card); border-color:var(--orange);}
  .service-icon{width:48px; height:48px; border-radius:10px; background:var(--black); display:flex; align-items:center; justify-content:center; margin-bottom:18px;}
  .service-icon svg{width:24px; height:24px; color:var(--orange);}
  .service-card h3{font-family:'Inter',sans-serif; text-transform:none; font-weight:800; font-size:17px; letter-spacing:0; line-height:1.3;}
  .service-card p{margin-top:10px; font-size:14.5px; color:var(--gray); line-height:1.55;}
  /* ---------- how it works ---------- */
  .how{background:var(--black); color:var(--white); position:relative; overflow:hidden;}
  .how .section-head p{color:#C9C6BF;}
  .how .eyebrow{color:var(--orange);}
  .how .eyebrow::before{background:var(--orange);}
  .how h2{color:var(--white);}
  .how-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:28px; position:relative; z-index:1;}
  .how-step{padding:8px 0;}
  .how-num{font-family:'Anton'; font-size:56px; color:var(--orange); line-height:1;}
  .how-step h3{font-family:'Inter'; text-transform:none; font-weight:800; font-size:19px; margin-top:14px; color:var(--white);}
  .how-step p{margin-top:10px; color:#C9C6BF; font-size:15px; line-height:1.6;}
  .how-connector{height:2px; background:linear-gradient(90deg, rgba(242,105,30,0.6), rgba(242,105,30,0));  margin:18px 0 0;}
  /* ---------- area ---------- */
  .area{background:var(--paper-dim);}
  .area .wrap{display:grid; grid-template-columns:1fr 1fr; gap:56px; align-items:center;}
  .area-card{
    background:var(--white); border:1px solid var(--line); border-radius:18px; padding:32px;
    box-shadow:var(--shadow-card);
  }
  .area-addr{display:flex; gap:14px; align-items:flex-start; padding:16px 0; border-bottom:1px solid var(--line);}
  .area-addr:last-child{border-bottom:none;}
  .area-addr svg{width:22px; height:22px; color:var(--orange-deep); flex:none; margin-top:2px;}
  .area-addr strong{display:block; font-size:14.5px; font-weight:800; text-transform:uppercase; letter-spacing:0.03em;}
  .area-addr span{display:block; margin-top:4px; color:var(--gray); font-size:15px; line-height:1.5;}
  .suburb-tags{display:flex; flex-wrap:wrap; gap:9px; margin-top:18px;}
  .suburb-tags span{background:var(--orange-light); color:var(--orange-deep); font-weight:700; font-size:12.5px; padding:7px 12px; border-radius:100px; text-transform:uppercase; letter-spacing:0.02em;}
  /* ---------- reviews ---------- */
  .reviews{background:var(--white);}
  .review-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:22px;}
  .review-card{background:var(--paper); border:1px solid var(--line); border-radius:16px; padding:26px;}
  .stars{display:flex; gap:3px; margin-bottom:14px;}
  .stars svg{width:16px; height:16px; color:var(--orange);}
  .review-card p{font-size:15px; line-height:1.65; color:var(--black);}
  .review-who{display:flex; align-items:center; gap:10px; margin-top:18px;}
  .review-avatar{width:38px; height:38px; border-radius:50%; background:var(--black); color:var(--white); display:flex; align-items:center; justify-content:center; font-weight:800; font-size:14px;}
  .review-who strong{display:block; font-size:14px;}
  .review-who span{display:block; font-size:12.5px; color:var(--gray);}
  .review-note{margin-top:36px; text-align:center; color:var(--gray-light); font-size:13px;}
  /* ---------- quote form ---------- */
  .quote{background:var(--paper-dim); position:relative;}
  .quote .wrap{display:grid; grid-template-columns:0.85fr 1.15fr; gap:56px; align-items:start;}
  .quote-info h2{font-size:clamp(28px,3.6vw,40px); margin-top:14px;}
  .quote-info p{margin-top:16px; color:var(--gray); font-size:16px; line-height:1.65;}
  .quote-info-list{margin-top:26px; display:flex; flex-direction:column; gap:14px;}
  .quote-info-list li{display:flex; gap:12px; align-items:flex-start; font-size:14.5px; font-weight:700;}
  .quote-info-list svg{width:20px; height:20px; color:var(--orange-deep); flex:none; margin-top:1px;}
  .quote-call{margin-top:30px; padding-top:26px; border-top:1px solid var(--line);}
  .quote-call span{display:block; font-size:13px; font-weight:700; color:var(--gray); text-transform:uppercase; letter-spacing:0.04em; margin-bottom:8px;}
  .quote-form{
    background:var(--white); border-radius:20px; border:1px solid var(--line);
    padding:34px; box-shadow:var(--shadow-card);
  }
  .form-row{display:grid; grid-template-columns:1fr 1fr; gap:16px;}
  .field{margin-bottom:18px;}
  .field label{display:block; font-size:13px; font-weight:800; text-transform:uppercase; letter-spacing:0.03em; margin-bottom:8px;}
  .field .req{color:var(--orange-deep);}
  .field input[type=text], .field input[type=tel], .field input[type=email], .field textarea{
    width:100%; border:1.5px solid var(--line); border-radius:10px; padding:13px 14px;
    font-family:'Inter'; font-size:15px; background:var(--paper); transition:border-color .15s ease, background .15s ease;
  }
  .field input:focus, .field textarea:focus{border-color:var(--orange); background:var(--white); outline:none;}
  .field textarea{resize:vertical; min-height:96px;}
  .file-drop{
    border:1.5px dashed var(--line); border-radius:10px; padding:20px; text-align:center;
    background:var(--paper); cursor:pointer; transition:border-color .15s ease, background .15s ease;
    position:relative;
  }
  .file-drop:hover{border-color:var(--orange);}
  .file-drop svg{width:26px; height:26px; color:var(--orange-deep); margin-bottom:8px;}
  .file-drop p{font-size:14px; font-weight:700;}
  .file-drop span{display:block; font-size:12.5px; color:var(--gray); margin-top:4px;}
  .file-drop input[type=file]{position:absolute; inset:0; opacity:0; cursor:pointer;}
  #file-list{margin-top:10px; font-size:13px; color:var(--orange-deep); font-weight:700;}
  .form-submit{width:100%; margin-top:6px; justify-content:center;}
  .form-note{margin-top:14px; font-size:12.5px; color:var(--gray); line-height:1.6; text-align:center;}
  .form-success{
    display:none; margin-top:16px; background:var(--orange-light); border:1px solid var(--orange);
    color:var(--orange-deep); font-weight:700; font-size:13.5px; padding:14px 16px; border-radius:10px; line-height:1.55;
  }
  .form-success.show{display:block;}
  /* ---------- cta banner ---------- */
  .cta-banner{background:var(--orange); position:relative; overflow:hidden;}
  .cta-banner .wrap{
    display:flex; align-items:center; justify-content:space-between; gap:30px; flex-wrap:wrap; padding:60px 24px;
  }
  .cta-banner h2{color:var(--white); font-size:clamp(26px,3.6vw,38px); line-height:1.05;}
  .cta-banner p{color:rgba(255,255,255,0.9); margin-top:10px; font-size:15.5px;}
  .cta-banner .btns{display:flex; gap:14px; flex-wrap:wrap;}
  .cta-banner .btn-dark{background:var(--black);}
  .cta-banner .btn-outline{border-color:var(--white); color:var(--white);}
  /* ---------- footer ---------- */
  footer{background:var(--black); color:#D8D5CE; padding:70px 0 0;}
  .footer-grid{display:grid; grid-template-columns:1.3fr 1fr 1fr 1.1fr; gap:40px; padding-bottom:50px; border-bottom:1px solid rgba(255,255,255,0.1);}
  .footer-brand img{height:40px; filter:brightness(0) invert(1);}
  .footer-brand p{margin-top:16px; font-size:14px; line-height:1.6; color:#ABA79E; max-width:280px;}
  .footer-col h4{font-family:'Inter'; text-transform:uppercase; font-size:13px; letter-spacing:0.06em; color:#8F8B82; font-weight:800; margin-bottom:16px;}
  .footer-col li{margin-bottom:11px; font-size:14.5px;}
  .footer-col a:hover{color:var(--orange);}
  .footer-contact li{display:flex; gap:10px; align-items:flex-start;}
  .footer-contact svg{width:17px; height:17px; color:var(--orange); flex:none; margin-top:3px;}
  .footer-bottom{display:flex; justify-content:space-between; align-items:center; padding:22px 0; font-size:12.5px; color:#8F8B82; flex-wrap:wrap; gap:10px;}
  .footer-bottom .tags{display:flex; gap:16px; flex-wrap:wrap;}
  /* ---------- mobile sticky cta ---------- */
  .mobile-cta{
    position:fixed; left:0; right:0; bottom:0; z-index:70; display:none;
    background:var(--white); border-top:1px solid var(--line); box-shadow:0 -8px 24px -12px rgba(0,0,0,0.25);
    padding:10px 12px; gap:10px;
  }
  .mobile-cta a{flex:1; text-align:center; padding:14px 10px; font-size:13px;}
  /* ---------- reveal animation ---------- */
  .reveal{opacity:0; transform:translateY(18px); transition:opacity .6s ease, transform .6s ease;}
  .reveal.in{opacity:1; transform:translateY(0);}
  @media (prefers-reduced-motion: reduce){
    html{scroll-behavior:auto;}
    .reveal{opacity:1; transform:none; transition:none;}
  }
  /* ================= RESPONSIVE ================= */
  @media (max-width:1024px){
    .hero-inner{grid-template-columns:1fr;}
    .hero-art{max-width:420px;}
    .service-grid{grid-template-columns:repeat(2,1fr);}
    .review-grid{grid-template-columns:1fr;}
    .area .wrap{grid-template-columns:1fr; gap:36px;}
    .quote .wrap{grid-template-columns:1fr;}
    .footer-grid{grid-template-columns:1fr 1fr;}
  }
  @media (max-width:860px){
    .nav-links{display:none;}
    .hamburger{display:inline-flex; align-items:center; justify-content:center;}
    .nav-actions .btn-dark, .nav-actions .btn-primary{display:none;}
    .trustbar .wrap{grid-template-columns:repeat(3,1fr); row-gap:26px;}
    .how-grid{grid-template-columns:1fr; gap:0;}
    .how-step{padding:22px 0;}
    .how-step:not(:last-child){border-bottom:1px solid rgba(255,255,255,0.12);}
    body{padding-bottom:78px;}
    .mobile-cta{display:flex;}
  }
  @media (max-width:640px){
    section{padding:60px 0;}
    .service-grid{grid-template-columns:1fr;}
    .trustbar .wrap{grid-template-columns:repeat(2,1fr);}
    .form-row{grid-template-columns:1fr;}
    .cta-banner .wrap{flex-direction:column; align-items:flex-start;}
    .footer-grid{grid-template-columns:1fr; gap:32px;}
    .quote-form{padding:24px;}
    .hero-inner{padding:52px 20px 64px;}
    .hero-trust{gap:16px;}
  }
</style>
